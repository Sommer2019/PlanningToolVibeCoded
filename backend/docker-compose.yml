version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: planningtool-db
    environment:
      POSTGRES_DB: planningtool
      POSTGRES_USER: planningtool
      POSTGRES_PASSWORD: planningtool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
