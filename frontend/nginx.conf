# Serves the built SPA. The gateway (Traefik) strips the /planning prefix before
# requests reach here, so nginx serves at root.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve the file if it exists, otherwise fall back to index.html so
    # client-side routes (e.g. /board, /projects/...) work on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must not be cached (so new deploys are picked up); the hashed
    # assets are immutable and can be cached aggressively.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
