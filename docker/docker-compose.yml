# Local/integration stack: Postgres + backend.
# Backend runs in MOCK auth mode for convenience — select an identity with the
# `X-Mock-User` header (TestAdmin / TestUser1..3). NEVER use mock in production.
#
#   docker compose up --build
#
# Backend:    http://localhost:8080/api
# Swagger UI: http://localhost:8080/swagger-ui.html

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planning
      POSTGRES_USER: planning
      POSTGRES_PASSWORD: planning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d planning"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    image: ghcr.io/sommer2019/planningtoolvibecoded-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mock
      APP_AUTH_MOCK: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/planning
      SPRING_DATASOURCE_USERNAME: planning
      SPRING_DATASOURCE_PASSWORD: planning
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173"
    ports:
      - "8080:8080"

volumes:
  pgdata:
