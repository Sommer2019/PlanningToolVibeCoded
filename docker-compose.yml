# Local/integration stack: Postgres + backend (Team 4 — Projektplanung).
# Backend runs in MOCK auth mode for convenience — select an identity with the
# `X-Mock-User` header (TestAdmin / TestUser1..3). NEVER use mock in production.
#
#   docker compose up --build
#
# Backend (direct):   http://localhost:8004/api
# Health:             http://localhost:8004/health        -> {"status":"ok"}
# OpenAPI:            http://localhost:8004/openapi.json
# Swagger UI:         http://localhost:8004/swagger-ui.html
#
# Service names are prefixed `planning-` so they don't collide when this snippet
# is merged into the orchestrator stack. The Traefik labels route `/planning` to
# this service (port 8004) and strip the prefix, so the module keeps serving
# `/health`, `/api/...`, `/openapi.json` at its root.

services:
  planning-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: planning
      POSTGRES_USER: planning
      POSTGRES_PASSWORD: planning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d planning"]
      interval: 10s
      timeout: 5s
      retries: 5

  planning-backend:
    build:
      context: ./backend
      dockerfile: ./docker/Dockerfile
    image: ghcr.io/sommer2019/planningtoolvibecoded-backend:latest
    depends_on:
      planning-postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mock
      APP_AUTH_MOCK: "true"
      SPRING_DATASOURCE_URL: jdbc:postgresql://planning-postgres:5432/planning
      SPRING_DATASOURCE_USERNAME: planning
      SPRING_DATASOURCE_PASSWORD: planning
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:4173"
    ports:
      - "8004:8004"
    labels:
      - traefik.enable=true
      - traefik.http.routers.planning-api.rule=PathPrefix(`/api`)
      - traefik.http.services.planning-api.loadbalancer.server.port=8004

volumes:
  pgdata:
